<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>今日行动</title><style>body{margin:0;background:#0b1020;color:#e2e8f0;font-family:system-ui}nav{display:flex;justify-content:space-between;padding:16px 24px;background:#111827}.btn{background:#1f2937;border:1px solid #334155;color:#fff;padding:8px 12px;border-radius:8px;cursor:pointer}.wrap{padding:20px;max-width:980px;margin:auto}.card{background:#111827;border:1px solid #334155;border-radius:12px;padding:14px;margin-bottom:14px}input{width:100%;padding:10px;border-radius:8px;border:1px solid #334155;background:#1f2937;color:#fff}</style></head><body><nav><h2>晨报OS</h2><div><a class="btn" href="/index.html">首页</a><a class="btn" href="/today.html">今日</a><a class="btn" href="/chat.html">对话</a><a class="btn" href="/memory.html">记忆库</a><a class="btn" href="/admin.html">设置</a></div></nav><div class="wrap"><div class="card"><h3>今日主任务</h3><div id="main"></div></div><div class="card"><h3>今日待办</h3><div id="todos"></div></div><div class="card"><h3>收件箱 Inbox</h3><div id="inbox"></div></div></div><script>function h(){const t=localStorage.getItem('morning_os_token')||'';return {'Content-Type':'application/json','Authorization':t?'Bearer '+t:''}}async function load(){const all=await (await fetch('/api/tasks',{headers:h()})).json();const today=await (await fetch('/api/tasks/today',{headers:h()})).json();const m=today.task;if(m){main.innerHTML=`<p>${m.title}</p><button class='btn' onclick="move('${m.id}','done')">标记完成</button><button class='btn' onclick="move('${m.id}','todo')">标记未完成</button>`;}else{main.innerHTML=`<input id='t' placeholder='今天最重要的一件事是什么？'><button class='btn' onclick='setToday()'>设为今日主任务</button>`;}const now=new Date();const isToday=(d)=>{if(!d)return false;const x=new Date(d);return x.getFullYear()==now.getFullYear()&&x.getMonth()==now.getMonth()&&x.getDate()==now.getDate();};const todos=(all.tasks||[]).filter(x=>x.status==='todo'&&(isToday(x.due_at)||x.priority>=4));todosEl=todos.map(x=>`<div><b>${x.title}</b> <button class='btn' onclick="move('${x.id}','done')">完成</button> <button class='btn' onclick="editTask('${x.id}')">编辑</button> <button class='btn' onclick="move('${x.id}','snoozed')">推迟</button></div>`).join('')||'暂无';document.getElementById('todos').innerHTML=todosEl;document.getElementById('inbox').innerHTML=(all.inbox||[]).map(x=>`<div><b>${x.title}</b><br>来源：${x.source_type||'未知'}，置信度：${x.confidence||0}<br><button class='btn' onclick="confirmInbox('${x.id}')">确认为任务</button> <button class='btn' onclick="delTask('${x.id}')">删除</button></div>`).join('')||'暂无';}async function setToday(){await fetch('/api/tasks/today',{method:'POST',headers:h(),body:JSON.stringify({title:document.getElementById('t').value})});load();}async function confirmInbox(id){await fetch('/api/tasks/confirm-inbox/'+id,{method:'POST',headers:h()});load();}async function move(id,status){await fetch('/api/tasks/'+id+'/move',{method:'POST',headers:h(),body:JSON.stringify({status})});load();}async function delTask(id){await fetch('/api/tasks/'+id,{method:'DELETE',headers:h()});load();}async function editTask(id){const title=prompt('请输入新标题');if(!title)return;await fetch('/api/tasks/'+id,{method:'PUT',headers:h(),body:JSON.stringify({title})});load();}load();</script></body></html>
