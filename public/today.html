<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>今日行动</title><style>body{margin:0;background:#0b1020;color:#e2e8f0;font-family:system-ui}nav{display:flex;justify-content:space-between;padding:16px 24px;background:#111827}.btn{background:#1f2937;border:1px solid #334155;color:#fff;padding:8px 12px;border-radius:8px;cursor:pointer}.wrap{padding:20px;max-width:980px;margin:auto}.card{background:#111827;border:1px solid #334155;border-radius:12px;padding:14px;margin-bottom:14px}input,select{padding:8px;border-radius:8px;border:1px solid #334155;background:#1f2937;color:#fff}</style></head><body><nav><h2>晨报OS</h2><div><a class="btn" href="/index.html">首页</a> <a class="btn" href="/report">报告</a> <a class="btn" href="/today.html">今日</a> <a class="btn" href="/chat.html">对话</a> <a class="btn" href="/memory.html">记忆库</a> <a class="btn" href="/research.html">研究</a> <a class="btn" href="/admin.html">设置</a></div></nav><div class="wrap"><div class="card"><h3>今日主任务</h3><div id="main"></div><button class="btn" onclick="addManualTask()">手动添加任务</button></div><div class="card"><h3>今日待办</h3><div id="todos"></div></div><div class="card"><h3>待确认任务</h3><div id="inbox"></div></div><div class="card"><h3>观察项</h3><div id="watch"></div></div></div><script>
function h(){const t=localStorage.getItem('morning_os_jwt')||'';return {'Content-Type':'application/json','Authorization':t?'Bearer '+t:''}}
async function api(url,opt={}){const r=await fetch(url,{...opt,headers:{...h(),...(opt.headers||{})}});if(r.status===401){localStorage.removeItem('morning_os_jwt');location.href='/login.html';return;}return r;}
async function load(){const all=await (await api('/api/tasks')).json();const today=await (await api('/api/tasks/today')).json();const m=today.task;main.innerHTML=m?`<p>${m.title}</p>`:`<input id='t' placeholder='今天最重要的一件事是什么？'><button class='btn' onclick='setToday()'>设为今日主任务</button>`;document.getElementById('todos').innerHTML=(all.tasks||[]).filter(x=>x.status==='todo').map(x=>`<div><b>${x.title}</b> <button class='btn' onclick="move('${x.id}','done')">完成</button> <button class='btn' onclick="snooze('${x.id}')">推迟</button></div>`).join('')||'暂无';document.getElementById('inbox').innerHTML=(all.inbox||[]).map(x=>`<div><b>${x.title}</b><button class='btn' onclick="confirmInbox('${x.id}')">转为任务</button> <button class='btn' onclick="delInbox('${x.id}')">删除</button></div>`).join('')||'暂无';document.getElementById('watch').innerHTML=(all.watch||[]).filter(x=>x.status==='watch').map(x=>`<div><b>${x.title}</b><button class='btn' onclick="watchToTask('${x.id}')">转为任务</button> <button class='btn' onclick="delTask('${x.id}')">删除</button></div>`).join('')||'暂无';}
async function setToday(){await api('/api/tasks/today',{method:'POST',body:JSON.stringify({title:document.getElementById('t').value})});load();}
async function addManualTask(){const title=prompt('任务标题'); if(!title) return; const priority=Number(prompt('优先级1-5','3')||3); const due_at=prompt('截止日期(YYYY-MM-DD，可留空)',''); await api('/api/tasks',{method:'POST',body:JSON.stringify({title,priority,due_at:due_at?new Date(due_at).toISOString():null,source_type:'manual'})}); load();}
async function confirmInbox(id){await api('/api/tasks/confirm-inbox/'+id,{method:'POST'});load();}
async function delInbox(id){if(!confirm('确认删除这条待确认任务？')) return; await delTask(id);}async function move(id,status){await api('/api/tasks/'+id+'/move',{method:'POST',body:JSON.stringify({status})});load();}
async function delTask(id){await api('/api/tasks/'+id,{method:'DELETE'});load();}
async function watchToTask(id){await move(id,'todo');}
async function snooze(id){const c=prompt('请输入推迟选项：明天/三天后/下周/YYYY-MM-DD','明天');const now=new Date();let d=new Date();if(c==='明天')d.setDate(now.getDate()+1);else if(c==='三天后')d.setDate(now.getDate()+3);else if(c==='下周')d.setDate(now.getDate()+7);else d=new Date(c);await api('/api/tasks/'+id,{method:'PUT',body:JSON.stringify({due_at:d.toISOString(),status:'snoozed'})});load();}
load();</script></body></html>
