<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{margin:0;background:#0b1020;color:#fff;font-family:system-ui;padding:16px}.tabs button{margin-right:8px}.item{background:#111827;border:1px solid #334155;border-radius:10px;padding:10px;margin:8px 0}.bar{height:8px;background:#1f2937;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:#22c55e}.conf{background:#7c2d12;padding:10px;border-radius:8px;margin-bottom:10px}button{margin-right:6px}</style></head><body><h2>记忆库</h2><button onclick="addMemory()">手动添加记忆</button><button onclick="pruneMemory()">AI修剪</button><div id='token'></div><div id='conflict'></div><div class='tabs'><button onclick="tab='identity';render()">身份记忆</button><button onclick="tab='knowledge';render()">知识记忆</button><button onclick="tab='inference';render()">推断记忆</button><button onclick="tab='archive';render()">归档</button><button onclick="tab='review';render()">待确认</button></div><div id='list'></div><script>function getAuthHeaders(){const token=localStorage.getItem('morning_os_jwt')||'';return {'Content-Type':'application/json','Authorization':token?'Bearer '+token:''};}let m={identity:[],knowledge:[],inference:[],archive:[],meta:{}};let tab='identity';async function load(){m=await (await fetch('/api/memory')).json();render();}function card(i,isArchive=false){return `<div class='item'><b>${i.title}</b> <small>[${i.source||'手动'}]</small><p>${(i.content||'').slice(0,120)}</p><div>日期：${i.date_updated||i.date_created||''} 重要度:${i.importance||0}</div><div>衰减:${i.decay_score??'-'}</div><div class='bar'><i style='width:${((i.decay_score||0)/10)*100}%;background:${(i.decay_score||0)<3?'#f59e0b':'#22c55e'}'></i></div><button onclick='hist("${i.id}")'>查看历史版本</button>${i.needs_review?`<button onclick='confirmKeep("${i.id}")'>确认保留</button>`:''}${!isArchive?`<button onclick='editItem("${i.id}")'>编辑</button><button onclick='archiveItem("${i.id}")'>归档</button><button onclick='delItem("${i.id}")'>删除</button>`:`<button onclick='restore("${i.id}")'>恢复</button>`}</div>`;}function render(){token.innerHTML=`已使用 ${m.meta.total_tokens||0} / 50000 tokens<div class='bar'><i style='width:${Math.min(100,((m.meta.total_tokens||0)/50000)*100)}%'></i></div>`;const conflicts=[...m.knowledge,...m.inference].filter(i=>i.conflict);conflict.innerHTML=conflicts.length?`<div class='conf'>有${conflicts.length}条冲突记忆待处理 ${conflicts.map(c=>`<details><summary>${c.title}</summary><div>新：${c.content}</div><div>旧ID:${(c.related_ids||[])[0]||'无'}</div><button onclick="resolve('${c.id}','keep_new')">保留新的</button><button onclick="resolve('${c.id}','keep_old')">保留旧的</button><button onclick="merge('${c.id}')">合并</button></details>`).join('')}</div>`:'';const arr=tab==='review'?[...m.identity,...m.knowledge,...m.inference].filter(i=>i.needs_review):(m[tab]||[]);list.innerHTML=arr.map(i=>card(i,tab==='archive')).join('');}function findItem(id){return [...m.identity,...m.knowledge,...m.inference,...m.archive].find(i=>i.id===id)}function hist(id){alert(JSON.stringify(findItem(id).history||[],null,2));}async function editItem(id){const x=findItem(id);const title=prompt('标题',x.title);if(title===null)return;const content=prompt('内容',x.content);if(content===null)return;await fetch('/api/memory/'+id,{method:'PUT',headers:getAuthHeaders(),body:JSON.stringify({title,content})});load();}async function delItem(id){await fetch('/api/memory/'+id,{method:'DELETE',headers:getAuthHeaders()});load();}async function archiveItem(id){await fetch('/api/memory/archive/'+id,{method:'POST',headers:getAuthHeaders()});load();}async function resolve(id,action){await fetch('/api/memory/resolve-conflict',{method:'POST',headers:getAuthHeaders(),body:JSON.stringify({id,action})});load();}async function merge(id){const merged_content=prompt('输入合并后的内容');if(!merged_content)return;await fetch('/api/memory/resolve-conflict',{method:'POST',headers:getAuthHeaders(),body:JSON.stringify({id,action:'merge',merged_content})});load();}async function restore(id){await fetch('/api/memory/restore/'+id,{method:'POST',headers:getAuthHeaders()});load();}async function confirmKeep(id){const x=findItem(id);await fetch('/api/memory/'+id,{method:'PUT',headers:getAuthHeaders(),body:JSON.stringify({needs_review:false,confidence:Math.min(1,(x.confidence||0.7)+0.1)})});load();}
async function addMemory(){const type=prompt('类型(identity/knowledge/inference)','knowledge');if(!type)return;const title=prompt('标题');if(!title)return;const content=prompt('内容');if(!content)return;await fetch('/api/memory',{method:'POST',headers:getAuthHeaders(),body:JSON.stringify({type,title,content,importance:5,tags:[]})});load();}async function pruneMemory(){const r=await (await fetch('/api/memory/prune',{method:'POST',headers:getAuthHeaders()})).json();if(r.status==='pending'){alert('AI修剪功能即将上线');}else{alert(JSON.stringify(r.suggestions||[],null,2));}}load();</script></body></html>
