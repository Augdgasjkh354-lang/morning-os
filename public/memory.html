<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{margin:0;background:#0b1020;color:#fff;font-family:system-ui;padding:16px}.row{display:flex;gap:8px}.item{background:#111827;border:1px solid #334155;border-radius:10px;padding:10px;margin:8px 0}</style></head><body><h2>记忆库</h2><div class="row"><button onclick="addMem()">手动添加记忆</button><button onclick="prune()">AI修剪</button><input id="q" placeholder="搜索" oninput="render()"></div><div>标签：宏观/地缘/AI/个人/新闻/其他</div><div id="list"></div><script>let mem=[];async function load(){mem=(await (await fetch('/api/memory')).json()).memories||[];render();}function render(){const q=document.getElementById('q').value||'';list.innerHTML=mem.filter(i=>JSON.stringify(i).includes(q)).map(i=>`<div class='item'><b>${i.title||'无标题'}</b> [${i.source||'手动'}] ${i.date||''} 重要度:${i.importance||0}<br>${(i.tags||[]).join(',')}<p>${(i.content||'').slice(0,120)}</p><button onclick="editMem('${i.id}')">编辑</button><button onclick="delMem('${i.id}')">删除</button></div>`).join('');}async function addMem(){const title=prompt('标题'); if(!title)return; const content=prompt('内容')||'';const tags=(prompt('标签，逗号分隔')||'').split(',').filter(Boolean);const importance=Number(prompt('重要度1-10')||5);const r=await (await fetch('/api/memory',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,content,tags,importance,source:'手动'})})).json();if(!r.success&&r.message)alert(r.message);load();}async function delMem(id){await fetch('/api/memory/'+id,{method:'DELETE'});load();}async function editMem(id){const o=mem.find(i=>i.id===id);const title=prompt('标题',o.title)||o.title;const content=prompt('内容',o.content)||o.content;await fetch('/api/memory/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,content})});load();}async function prune(){const d=await (await fetch('/api/memory/prune',{method:'POST'})).json();alert('修剪建议：'+JSON.stringify(d.suggestions||[]));}load();</script></body></html>
