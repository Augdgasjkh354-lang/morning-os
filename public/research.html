<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>研究工作台</title><style>body{margin:0;background:#0b1020;color:#e2e8f0;font-family:system-ui}nav{display:flex;justify-content:space-between;padding:12px 18px;background:#111827}.btn{background:#1f2937;border:1px solid #334155;color:#fff;padding:6px 10px;border-radius:8px;cursor:pointer}.wrap{display:flex;height:calc(100vh - 56px)}.side{width:320px;border-right:1px solid #334155;padding:12px;overflow:auto}.main{flex:1;padding:14px;overflow:auto}.topic{border:1px solid #334155;border-radius:10px;padding:8px;margin:8px 0;cursor:pointer}.topic.active{border-color:#3b82f6}.tabs button{margin-right:8px}.panel{display:none}.panel.on{display:block}.card{background:#111827;border:1px solid #334155;border-radius:10px;padding:10px;margin:10px 0}input,textarea,select{width:100%;background:#1f2937;color:#fff;border:1px solid #334155;border-radius:8px;padding:8px;margin:4px 0}.row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}</style></head><body><nav><h3>晨报OS · 研究工作台</h3><div><a class="btn" href="/index.html">首页</a><a class="btn" href="/report">报告</a><a class="btn" href="/today.html">今日</a><a class="btn" href="/chat.html">对话</a><a class="btn" href="/memory.html">记忆库</a><a class="btn" href="/research.html">研究</a><a class="btn" href="/admin.html">设置</a></div></nav><div class="wrap"><div class="side"><button class="btn" onclick="createTopic()">新建主题</button> <button class="btn" onclick="autoGen()">自动从记忆库聚合</button><select id="sf" onchange="renderTopics()"><option value="all">全部</option><option value="active">进行中</option><option value="paused">已暂停</option><option value="concluded">已结论</option></select><div id="topics"></div></div><div class="main"><div class="tabs"><button onclick="show('overview')">概览</button><button onclick="show('materials')">资料库</button><button onclick="show('viewpoints')">观点卡片</button><button onclick="show('journal')">研究日志</button><button onclick="show('memory')">关联记忆</button><button onclick="show('tasks')">关联任务</button></div><div id="content"></div></div></div><script>
function h(){const t=localStorage.getItem('morning_os_token')||'';return {'Content-Type':'application/json','Authorization':t?'Bearer '+t:''}}
async function api(u,o={}){const r=await fetch(u,{...o,headers:{...h(),...(o.headers||{})}});if(r.status===401){localStorage.removeItem('morning_os_token');alert('登录失效，请重新输入令牌');location.href='/admin.html';throw new Error('401');}return r}
let list=[],cur=null,tab='overview',mem=[],tasks=[];
const fmt=s=>s?new Date(s).toLocaleString('zh-CN'):'-';
async function load(){list=(await (await api('/api/research')).json()).topics||[];mem=await (await api('/api/memory')).json();tasks=(await (await api('/api/tasks')).json()).tasks||[];renderTopics();if(cur) await openTopic(cur.id);}
function renderTopics(){const f=sf.value;const arr=list.filter(x=>f==='all'||x.status===f);topics.innerHTML=arr.map(t=>`<div class='topic ${cur&&cur.id===t.id?'active':''}' onclick="openTopic('${t.id}')"><b>${t.title}</b><div>${t.status==='active'?'进行中':t.status==='paused'?'已暂停':'已结论'} · 资料${t.materials_count||0}</div><small>${fmt(t.updated_at)}</small></div>`).join('')||'暂无主题';}
async function openTopic(id){cur=await (await api('/api/research/'+id)).json();show(tab);renderTopics();}
function show(t){tab=t;if(!cur){content.innerHTML='请先选择主题';return;}if(t==='overview')content.innerHTML=`<div class='card'><label>主题标题</label><input id='t1' value='${cur.title||''}'><label>描述</label><textarea id='t2'>${cur.description||''}</textarea><label>当前结论</label><textarea id='t3'>${cur.current_conclusion||''}</textarea><label>待验证问题（每行一条）</label><textarea id='t4'>${(cur.pending_questions||[]).join('\n')}</textarea><label>状态</label><select id='t5'><option value='active'>进行中</option><option value='paused'>已暂停</option><option value='concluded'>已结论</option></select><button class='btn' onclick='saveOverview()'>保存概览</button><div class='row'><div class='card'>关联记忆：${(cur.linked_memory_ids||[]).length}</div><div class='card'>关联任务：${(cur.linked_task_ids||[]).length}</div><div class='card'>资料数：${(cur.materials||[]).length}</div></div></div>`;setTimeout(()=>t5.value=cur.status||'active');
if(t==='materials'){const mats=cur.materials||[];content.innerHTML=`<div class='card'><label>URL</label><input id='murl' placeholder='粘贴URL'><button class='btn' onclick='fetchAndAdd()'>抓取并添加</button></div>`+mats.map(m=>`<div class='card'><b>${m.title}</b> <small>[${m.source_type}] ${m.source_date||''}</small><p>${m.summary||''}</p><a class='btn' target='_blank' href='${m.url||'#'}'>打开链接</a> <button class='btn' onclick="delMat('${m.id}')">删除</button></div>`).join('');}
if(t==='viewpoints'){const g=s=>(cur.viewpoints||[]).filter(v=>v.status===s).map(v=>`<div class='card'><b>${v.content}</b><p>证据：${v.evidence||'无'}</p><button class='btn' onclick="setVp('${v.id}','verified')">标记为已验证</button><button class='btn' onclick="setVp('${v.id}','refuted')">标记为已推翻</button><button class='btn' onclick="setVp('${v.id}','pending')">重置为待验证</button></div>`).join('')||'暂无';content.innerHTML=`<button class='btn' onclick='addVp()'>添加观点</button><h4>待验证</h4>${g('pending')}<h4>已验证</h4>${g('verified')}<h4>已推翻</h4>${g('refuted')}`}
if(t==='journal'){const icon={insight:'💡',question:'❓',update:'📝',material_added:'📎',viewpoint_added:'🔖'};content.innerHTML=`<button class='btn' onclick="quickJournal('insight')">记录想法</button> <button class='btn' onclick="quickJournal('question')">记录问题</button>`+(cur.journal||[]).map(j=>`<div class='card'>${icon[j.type]||'📝'} ${j.content}<br><small>${fmt(j.created_at)}</small></div>`).join('')}
if(t==='memory'){const all=[...(mem.identity||[]),...(mem.knowledge||[]),...(mem.inference||[])];const linked=all.filter(i=>(cur.linked_memory_ids||[]).includes(i.id));content.innerHTML=`<button class='btn' onclick='pickMem()'>从记忆库添加</button>`+linked.map(i=>`<div class='card'><b>${i.title}</b><p>${(i.content||'').slice(0,120)}</p><button class='btn' onclick="unlinkMem('${i.id}')">解除关联</button></div>`).join('')}
if(t==='tasks'){const linked=tasks.filter(i=>(cur.linked_task_ids||[]).includes(i.id));content.innerHTML=linked.map(i=>`<div class='card'><b>${i.title}</b><p>状态:${i.status} 优先级:${i.priority||'-'}</p><a class='btn' href='/today.html'>跳转到今日页</a></div>`).join('')||'暂无关联任务';}}
async function createTopic(){const title=prompt('主题标题');if(!title)return;await api('/api/research',{method:'POST',body:JSON.stringify({title,description:'',tags:[],linked_memory_ids:[]})});load();}
async function autoGen(){await api('/api/research/auto-generate',{method:'POST'});load();}
async function saveOverview(){await api('/api/research/'+cur.id,{method:'PUT',body:JSON.stringify({title:t1.value,description:t2.value,current_conclusion:t3.value,pending_questions:t4.value.split(/\n/).map(x=>x.trim()).filter(Boolean),status:t5.value})});await openTopic(cur.id)}
async function fetchAndAdd(){const url=murl.value.trim();if(!url)return;const meta=await (await api('/api/research/'+cur.id+'/materials/fetch-url',{method:'POST',body:JSON.stringify({url})})).json();const title=prompt('资料标题',meta.title||url);if(title===null)return;const summary=prompt('资料摘要',meta.summary||'')||'';await api('/api/research/'+cur.id+'/materials',{method:'POST',body:JSON.stringify({url,title,summary,source_type:'url',source_date:new Date().toISOString().slice(0,10),tags:[]})});openTopic(cur.id)}
async function delMat(id){await api('/api/research/'+cur.id+'/materials/'+id,{method:'DELETE'});openTopic(cur.id)}
async function addVp(){const content=prompt('观点内容');if(!content)return;const evidence=prompt('支撑证据','')||'';await api('/api/research/'+cur.id+'/viewpoints',{method:'POST',body:JSON.stringify({content,evidence})});openTopic(cur.id)}
async function setVp(id,status){await api('/api/research/'+cur.id+'/viewpoints/'+id,{method:'PUT',body:JSON.stringify({status})});openTopic(cur.id)}
async function quickJournal(type){const content=prompt(type==='question'?'记录问题':'记录想法');if(!content)return;await api('/api/research/'+cur.id+'/journal',{method:'POST',body:JSON.stringify({content,type})});openTopic(cur.id)}
async function unlinkMem(id){await api('/api/research/'+cur.id+'/link-memory/'+id,{method:'DELETE'});openTopic(cur.id)}
async function pickMem(){const kw=prompt('输入关键词过滤记忆');if(kw===null)return;const all=[...(mem.identity||[]),...(mem.knowledge||[]),...(mem.inference||[])].filter(i=>(i.title+i.content).includes(kw));const pick=prompt('输入要关联的记忆ID（可多个，逗号分隔）\n'+all.slice(0,20).map(i=>`${i.id} ${i.title}`).join('\n'));if(!pick)return;for(const id of pick.split(',').map(x=>x.trim()).filter(Boolean)){await api('/api/research/'+cur.id+'/link-memory',{method:'POST',body:JSON.stringify({memory_id:id})});}openTopic(cur.id)}
load();</script></body></html>
