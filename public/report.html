<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>晨报</title><style>body{margin:0;background:#0b1020;color:#e2e8f0;font-family:system-ui}.wrap{max-width:980px;margin:24px auto;padding:20px;background:#111827;border:1px solid #334155;border-radius:12px}a{color:#93c5fd}</style></head><body><div class="wrap"><h2>最新晨报</h2><div id="content">加载中...</div></div><script>function getAuthHeaders(){const t=localStorage.getItem('morning_os_jwt')||'';return {'Authorization':t?'Bearer '+t:''}};(async()=>{const r=await fetch('/api/report-content',{headers:getAuthHeaders()});if(r.status===401){localStorage.removeItem('morning_os_jwt');location.href='/login.html';return;}const d=await r.json();if(d.empty){document.getElementById('content').textContent=d.message||'暂无报告';return;}document.getElementById('content').innerHTML=d.html||'';})();</script></body></html>
