<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>晨报OS</title><style>body{margin:0;background:#0b1020;color:#e2e8f0;font-family:system-ui}nav{display:flex;justify-content:space-between;padding:16px 24px;background:#111827}.btn{background:#1f2937;border:1px solid #334155;color:#fff;padding:8px 12px;border-radius:8px;margin-left:8px;cursor:pointer}.wrap{padding:24px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}.card{background:#111827;border:1px solid #334155;border-radius:12px;padding:14px}.ops{margin-top:20px;display:flex;gap:12px}.big{padding:12px 18px;background:#2563eb}</style></head><body><nav><h2>晨报OS</h2><div><a class="btn" href="/index.html">首页</a><a class="btn" href="/report">报告</a><a class="btn" href="/chat.html">对话</a><a class="btn" href="/memory.html">记忆库</a><a class="btn" href="/admin.html">设置</a></div></nav><div class="wrap"><div id="status">加载中...</div><div id="cards" class="grid"></div><div class="ops"><button id="gen" class="btn big">立即生成报告</button><a class="btn" href="/report">查看最新报告</a><a class="btn big" href="/chat.html">进入AI对话</a></div></div><script>function card(t,c){return `<div class='card'><h3>${t}</h3><div>${c}</div></div>`}async function load(){try{const d=await (await fetch('/api/latest-data')).json();const s=d.settings||{};let h='';if(s.weather_enabled!==false&&d.weather?.data)h+=card('天气卡片',`${s.city_name||''} ${d.weather.data.main?.temp??'-'}°C ${d.weather.data.weather?.[0]?.description??''} 湿度${d.weather.data.main?.humidity??'-'}%`);if(s.exchange_enabled!==false&&d.exchangeRates?.data)h+=card('汇率卡片',`USD/CNY ${d.exchangeRates.data.CNY??'-'}<br>USD/EUR ${d.exchangeRates.data.EUR??'-'}<br>USD/JPY ${d.exchangeRates.data.JPY??'-'}`);if(s.gold_enabled!==false&&d.metals?.data)h+=card('金银价格卡片',`黄金 ${d.metals.data.gold?.price??'-'}<br>白银 ${d.metals.data.silver?.price??'-'}`);if(s.news_enabled!==false)h+=card('今日要闻卡片',(d.news?.data||[]).slice(0,3).map(i=>`• ${i.title}`).join('<br>')||'暂无数据');if(s.wiki_enabled!==false)h+=card('维基知识卡片',`${d.wiki?.data?.title||'暂无'}<br>${d.wiki?.data?.extract?.slice(0,70)||''}`);document.getElementById('cards').innerHTML=h||'暂无数据';document.getElementById('status').innerText='';}catch{document.getElementById('status').innerText='暂无数据';}}document.getElementById('gen').onclick=async(e)=>{e.target.disabled=true;e.target.innerText='生成中...';await fetch('/trigger');alert('报告生成中，请稍后查看');e.target.disabled=false;e.target.innerText='立即生成报告';};load();</script></body></html>
