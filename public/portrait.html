<!doctype html><html lang='zh-CN'><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>认知画像</title><style>body{background:#0b1020;color:#fff;font-family:system-ui;max-width:980px;margin:0 auto;padding:20px}.card{background:#111827;border:1px solid #334155;border-radius:10px;padding:12px;margin:10px 0}.tag{display:inline-block;background:#1f2937;padding:4px 8px;border-radius:999px;margin:4px}</style><body><h1>认知画像</h1><button onclick='gen()'>重新生成画像</button><div id='time'></div><div class='card'><h3>核心兴趣领域（标签云）</h3><div id='tags'></div><h3>提问模式分析</h3><ul id='qp'></ul><h3>思维风格描述</h3><div id='ts'></div><h3>最近兴趣迁移</h3><div id='shift'></div><h3>反复出现主题</h3><ul id='themes'></ul><h3>推断知识盲区</h3><ul id='gaps'></ul></div><div class='card'><h3>数据统计</h3><div id='stats'></div></div><script>function h(){const t=localStorage.getItem('morning_os_jwt')||'';return {'Authorization':t?'Bearer '+t:''}}async function load(){const d=await (await fetch('/api/portrait',{headers:h()})).json();if(d.empty){document.getElementById('time').innerText='暂无画像，请点击重新生成';return;}render(d)}function render(d){time.innerText='最后生成时间：'+(d.generated_at||'-');tags.innerHTML=(d.top_tags||[]).map(t=>`<span class=tag>${t.tag}(${t.count})</span>`).join('');qp.innerHTML=(d.portrait?.question_patterns||[]).map(x=>`<li>${x}</li>`).join('');ts.innerText=d.portrait?.thinking_style||'-';shift.innerText=d.portrait?.recent_focus_shift||'-';themes.innerHTML=(d.portrait?.recurring_themes||[]).map(x=>`<li>${x}</li>`).join('');gaps.innerHTML=(d.portrait?.knowledge_gaps||[]).map(x=>`<li>${x}</li>`).join('');stats.innerHTML=`记忆库总条数：${d.total_memories||0}<br>任务总数：${d.total_tasks||0}<br>对话总次数：${d.total_conversations||0}`;}async function gen(){render(await (await fetch('/api/portrait/generate',{method:'POST',headers:h()})).json())}load();</script></body></html>
