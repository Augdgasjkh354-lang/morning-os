<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><title>登录 - Morning OS</title><style>body{background:#111;color:#eee;font-family:sans-serif;display:flex;justify-content:center;padding-top:60px}.box{width:380px;background:#1e1e1e;padding:20px;border-radius:10px}input,button,select{width:100%;margin:6px 0;padding:10px;background:#2b2b2b;color:#fff;border:1px solid #444}button{cursor:pointer}.tabs button{width:49%}</style></head><body><div class='box'><div class='tabs'><button onclick='sw(0)'>登录</button><button onclick='sw(1)'>注册</button></div><div id='login'><input id='lu' placeholder='用户名'><input id='lp' type='password' placeholder='密码'><button onclick='login()'>登录</button></div><div id='reg' style='display:none'><input id='ru' placeholder='用户名'><input id='rp' type='password' placeholder='密码'><input id='rc' type='password' placeholder='确认密码'><input id='ri' placeholder='邀请码'><button onclick='register()'>注册</button></div><p id='msg'></p></div><script>function sw(i){login.style.display=i?'none':'block';reg.style.display=i?'block':'none'} async function login(){const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:lu.value,password:lp.value})});const d=await r.json();if(d.token){localStorage.setItem('morning_os_jwt',d.token);location.href='/index.html'}else msg.innerText=d.error||'登录失败'} async function register(){if(rp.value!==rc.value)return msg.innerText='两次密码不一致';const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:ru.value,password:rp.value,invite_code:ri.value})});const d=await r.json();msg.innerText=d.message||d.error||'';if(d.success)sw(0)}</script></body></html>
