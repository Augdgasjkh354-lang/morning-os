<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script><style>body{margin:0;background:#0b1020;color:#fff;font-family:system-ui;display:flex;height:100vh}.side{width:260px;background:#111827;padding:12px;overflow:auto}.main{flex:1;display:flex;flex-direction:column}.msgs{flex:1;overflow:auto;padding:16px}.m{max-width:70%;padding:10px;border-radius:10px;margin:8px 0}.u{margin-left:auto;background:#2563eb}.a{background:#1f2937}.bar{padding:8px;background:#111827;display:flex;justify-content:space-between}textarea{width:100%;height:70px;background:#1f2937;color:#fff;border:1px solid #334155}</style></head><body><div class="side"><button onclick="newChat()">新建对话</button><div id="list"></div></div><div class="main"><div class="bar"><div contenteditable id="title">新对话</div><div><button onclick="importMem()">导入记忆库</button><span id="mem">记忆库状态:0</span></div></div><div id="msgs" class="msgs"></div><div><textarea id="input"></textarea><button onclick="send()">发送</button></div></div><script>let cid='';let timer=null;async function loadList(){const l=await (await fetch('/api/conversations')).json();document.getElementById('list').innerHTML=l.map(i=>`<div onclick="openChat('${i.id}')">${i.title}<br><small>${i.updated_at||''}</small></div>`).join('');const m=await (await fetch('/api/memory')).json();document.getElementById('mem').innerText='记忆库状态:'+((m.memories||[]).length);}function add(role,txt){const d=document.createElement('div');d.className='m '+(role==='user'?'u':'a');d.innerHTML=marked.parse(txt||'');msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;}async function openChat(id){cid=id;msgs.innerHTML='';const c=await (await fetch('/api/conversations/'+id)).json();(c.messages||[]).forEach(m=>add(m.role,m.content));}function newChat(){cid='';msgs.innerHTML='';title.innerText='新对话';}async function send(){const v=input.value.trim();if(!v)return;add('user',v);input.value='';const r=await (await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:v,conversation_id:cid})})).json();cid=r.conversation_id;let i=0;const t=setInterval(()=>{if(i===0)add('assistant','');const nodes=[...document.querySelectorAll('.a')];nodes.at(-1).innerHTML=marked.parse((r.reply||'').slice(0,i));i++;if(i>(r.reply||'').length)clearInterval(t);},15);if(timer)clearTimeout(timer);timer=setTimeout(()=>fetch('/api/chat/summarize',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({conversation_id:cid})}),30000);loadList();}input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});async function importMem(){if(!cid)return;await fetch('/api/chat/summarize',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({conversation_id:cid})});alert('已导入记忆库');loadList();}loadList();</script></body></html>
