<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script><style>body{margin:0;background:#0b1020;color:#fff;font-family:system-ui;display:flex;height:100vh}.side{width:260px;background:#111827;padding:12px;overflow:auto}.main{flex:1;display:flex;flex-direction:column}.msgs{flex:1;overflow:auto;padding:16px}.m{max-width:70%;padding:10px;border-radius:10px;margin:8px 0}.u{margin-left:auto;background:#2563eb}.a{background:#1f2937}.bar{padding:8px;background:#111827;display:flex;justify-content:space-between}textarea{width:100%;height:70px;background:#1f2937;color:#fff;border:1px solid #334155}</style></head><body><div class="side"><button onclick="newChat()">新建对话</button><div id="list"></div></div><div class="main"><div class="bar"><div contenteditable id="title">新对话</div><div><button onclick="importMem()">导入记忆库</button><span id="mem">记忆库状态:0</span></div></div><div id="msgs" class="msgs"></div><div><textarea id="input"></textarea><button onclick="send()">发送</button></div></div><script>function getAuthHeaders(){const token=localStorage.getItem('morning_os_jwt')||'';return {'Content-Type':'application/json','Authorization':token?'Bearer '+token:''};}let cid='';let timer=null;async function loadList(){const l=await (await fetch('/api/conversations')).json();document.getElementById('list').innerHTML=l.map(i=>`<div onclick="openChat('${i.id}')">${i.title}<br><small>${i.updated_at||''}</small></div>`).join('');const m=await (await fetch('/api/memory')).json();document.getElementById('mem').innerText='记忆库状态:'+((m.identity||[]).length+(m.knowledge||[]).length+(m.inference||[]).length);}function add(role,txt,used=[],autoActions=[],usedTools=[]){const d=document.createElement('div');d.className='m '+(role==='user'?'u':'a');d.innerHTML=marked.parse(txt||'');if(role==='assistant'&&used.length){const ref=document.createElement('div');const tags=[...new Set(used.flatMap(x=>x.tags||[]))].slice(0,3);ref.style='font-size:12px;color:#94a3b8;margin-top:6px;';ref.innerText=`参考了 ${used.length} 条记忆：${tags.join('、')||'无标签'}`;d.appendChild(ref);}
if(role==='assistant'&&usedTools.length){const tip=document.createElement('div');tip.style='font-size:12px;color:#9ca3af;margin-top:4px;';tip.innerText='调用了工具：'+usedTools.join('、');d.appendChild(tip);}
if(role==='assistant'&&autoActions.length){const bar=document.createElement('div');bar.style='font-size:12px;color:#fcd34d;margin-top:6px;';bar.innerText=`AI自动执行了 ${autoActions.length} 项操作：`+autoActions.map(a=>a.tool==='add_memory'?`添加了记忆“${a.title||a.id}”`:`添加了任务“${a.title||a.id}”`).join(' / ');d.appendChild(bar);}msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;}async function openChat(id){cid=id;msgs.innerHTML='';const c=await (await fetch('/api/conversations/'+id)).json();(c.messages||[]).forEach(m=>add(m.role,m.content,[]));}function newChat(){cid='';msgs.innerHTML='';title.innerText='新对话';}async function send(){const v=input.value.trim();if(!v)return;add('user',v);input.value='';const r=await (await fetch('/api/chat',{method:'POST',headers:getAuthHeaders(),body:JSON.stringify({message:v,conversation_id:cid})})).json();cid=r.conversation_id;let i=0;const t=setInterval(()=>{if(i===0)add('assistant','',r.used_memories||[],r.auto_actions||[],r.used_tools||[]);const nodes=[...document.querySelectorAll('.a')];nodes.at(-1).innerHTML=marked.parse((r.reply||'').slice(0,i));i++;if(i>(r.reply||'').length)clearInterval(t);},15);if(timer)clearTimeout(timer);timer=setTimeout(()=>fetch('/api/chat/summarize',{method:'POST',headers:getAuthHeaders(),body:JSON.stringify({conversation_id:cid})}),600000);loadList();}input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});async function importMem(){if(!cid)return;const r=await (await fetch('/api/chat/summarize',{method:'POST',headers:getAuthHeaders(),body:JSON.stringify({conversation_id:cid})})).json();alert(`提炼完成，新增${(r.added||[]).length}条，合并${(r.merged||[]).length}条`);loadList();}loadList();</script></body></html>
