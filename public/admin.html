<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>设置</title><style>body{font-family:system-ui;background:#0b1020;color:#fff;max-width:900px;margin:0 auto;padding:20px}.card{background:#111827;padding:12px;border:1px solid #334155;border-radius:10px;margin:10px 0}input,textarea{width:100%;background:#1f2937;color:#fff;border:1px solid #334155;padding:8px;border-radius:8px}</style></head><body><h1>设置</h1><div class='card'><h3>关于我</h3><label>昵称</label><input id='nickname'><label>当前状态</label><input id='status'><label>核心兴趣领域</label><textarea id='interests'></textarea><label>思维偏好</label><textarea id='thinking_style'></textarea><label>自定义背景指令</label><textarea id='custom_instruction'></textarea></div><button onclick='save()'>保存</button><script>let cur={profile:{}};async function load(){cur=await (await fetch('/api/settings')).json();const p=cur.profile||{};['nickname','status','interests','thinking_style','custom_instruction'].forEach(k=>document.getElementById(k).value=p[k]||'');}async function save(){cur.profile=cur.profile||{};['nickname','status','interests','thinking_style','custom_instruction'].forEach(k=>cur.profile[k]=document.getElementById(k).value);await fetch('/api/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cur)});alert('保存成功');}load();</script></body></html>
