<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>设置</title><style>body{font-family:system-ui;background:#0b1020;color:#fff;max-width:900px;margin:0 auto;padding:20px}.card{background:#111827;padding:12px;border:1px solid #334155;border-radius:10px;margin:10px 0}input,textarea{width:100%;background:#1f2937;color:#fff;border:1px solid #334155;padding:8px;border-radius:8px}</style></head><body><h1>设置</h1><button onclick='logout()'>退出登录</button><div class='card'><h3>访问令牌</h3><label>admin_token</label><input id='admin_token'><p>设置后，所有写操作和对话接口需要携带此令牌。留空则不启用鉴权。</p><button onclick='saveAdminToken()'>单独保存令牌</button></div><div class='card'><h3>关于我</h3><label>昵称</label><input id='nickname'><label>当前状态</label><input id='status'><label>核心兴趣领域</label><textarea id='interests'></textarea><label>思维偏好</label><textarea id='thinking_style'></textarea><label>自定义背景指令</label><textarea id='custom_instruction'></textarea></div><div class='card'><h3>对话AI倾向</h3><p>此设置在宪法约束下生效，用于调整AI的分析侧重点</p><textarea id='chat_system_prompt' rows='5'></textarea></div><button onclick='save()'>保存</button><script>function getAuthHeaders(){const token=localStorage.getItem('morning_os_token')||'';return {'Content-Type':'application/json','Authorization':token?'Bearer '+token:''};}let cur={profile:{}};async function load(){let t=localStorage.getItem('morning_os_token')||'';if(!t){const input=prompt('请输入访问令牌')||'';if(input){localStorage.setItem('morning_os_token',input);t=input;}}const resp=await fetch('/api/settings',{headers:getAuthHeaders()});if(resp.status===401){alert('令牌错误，请重新输入');localStorage.removeItem('morning_os_token');location.reload();return;}cur=await resp.json();const p=cur.profile||{};['nickname','status','interests','thinking_style','custom_instruction'].forEach(k=>document.getElementById(k).value=p[k]||'');document.getElementById('chat_system_prompt').value=cur.chat_system_prompt||'';document.getElementById('admin_token').value=localStorage.getItem('morning_os_token')||'';}async function save(){cur.profile=cur.profile||{};['nickname','status','interests','thinking_style','custom_instruction'].forEach(k=>cur.profile[k]=document.getElementById(k).value);cur.chat_system_prompt=document.getElementById('chat_system_prompt').value;const payload={...cur};delete payload.admin_token;await fetch('/api/settings',{method:'POST',headers:getAuthHeaders(),body:JSON.stringify(payload)});alert('保存成功');}async function saveAdminToken(){const token=document.getElementById('admin_token').value||'';const resp=await fetch('/api/admin-token',{method:'POST',headers:getAuthHeaders(),body:JSON.stringify({token})});if(resp.status===401){alert('令牌错误，请重新输入');localStorage.removeItem('morning_os_token');location.reload();return;}if(!resp.ok){alert('令牌保存失败');return;}localStorage.setItem('morning_os_token',token);alert('令牌已更新');}function logout(){localStorage.removeItem('morning_os_token');alert('已退出登录');location.reload();}load();</script></body></html>
