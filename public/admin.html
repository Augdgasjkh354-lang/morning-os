<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>晨报设置面板</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f172a;color:#e2e8f0;padding:20px;max-width:900px;margin:0 auto}
    h1{font-size:28px} .card{background:#111827;border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:16px}
    label{display:block;margin:8px 0 6px;color:#cbd5e1}
    input,select,textarea,button{width:100%;box-sizing:border-box;padding:10px;border-radius:8px;border:1px solid #475569;background:#1e293b;color:#f8fafc}
    textarea{min-height:120px;resize:vertical} .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .btn{background:#2563eb;cursor:pointer;font-weight:600;margin-top:10px}
    .btn.secondary{background:#059669}.btn.small{width:auto;padding:10px 14px}
    ul{list-style:none;padding:0} li{padding:10px;border:1px solid #334155;border-radius:8px;margin-bottom:8px;cursor:pointer}
    li:hover{background:#1f2937} .tip{color:#94a3b8;font-size:13px} .ok{color:#22c55e;font-weight:600}
    .radio{display:flex;gap:16px}.radio label{display:flex;align-items:center;gap:6px}
  </style>
</head>
<body>
  <h1>晨报设置面板</h1>
  <div id="msg"></div>

  <div class="card">
    <h2>API 配置</h2>
    <label>DeepSeek API Key</label><input id="deepseek_api_key" type="text" />
    <label>NewsAPI Key</label><input id="news_api_key" type="text" />
    <label>OpenWeatherMap API Key</label><input id="openweather_api_key" type="text" />
    <label>ExchangeRate API Key</label><input id="exchangerate_api_key" type="text" />
    <label>Gold API Key</label><input id="gold_api_key" type="text" />
    <label>Bark Token</label><input id="bark_token" type="text" />
    <div class="tip">填入后每天报告生成时自动推送到手机</div>
  </div>

  <div class="card">
    <h2>城市设置</h2>
    <div class="row">
      <input id="city_query" type="text" placeholder="输入城市名" />
      <button class="btn small" onclick="searchCity()">搜索城市</button>
    </div>
    <ul id="city_results"></ul>
    <div>已选城市：<span id="selected_city">未选择</span></div>
  </div>

  <div class="card">
    <h2>报告设置</h2>
    <label>新闻类别</label>
    <select id="news_category">
      <option value="general">综合</option>
      <option value="business">商业</option>
      <option value="technology">科技</option>
      <option value="science">科学</option>
      <option value="entertainment">娱乐</option>
      <option value="sports">体育</option>
    </select>
    <label>今日维基词条</label><input id="wiki_topic" type="text" />
    <label>报告风格</label>
    <div class="radio">
      <label><input type="radio" name="report_style" value="分析型" checked />分析型</label>
      <label><input type="radio" name="report_style" value="摘要型" />摘要型</label>
    </div>
    <label>DeepSeek 分析倾向</label>
    <textarea id="system_prompt"></textarea>
  </div>

  <button class="btn" onclick="saveSettings()">保存设置</button>
  <button class="btn secondary" onclick="triggerReport()">立即生成报告</button>

  <script>
    let current = {};

    function showMsg(text, ok=true){
      const el = document.getElementById('msg');
      el.innerHTML = `<p class="${ok?'ok':''}">${text}</p>`;
      setTimeout(()=>el.innerHTML='',3000);
    }

    async function loadSettings(){
      const res = await fetch('/api/settings');
      const data = await res.json();
      current = data;
      for(const key of ['deepseek_api_key','news_api_key','openweather_api_key','exchangerate_api_key','gold_api_key','bark_token','news_category','wiki_topic','system_prompt']){
        if(document.getElementById(key)) document.getElementById(key).value = data[key] || '';
      }
      const style = data.report_style || '分析型';
      document.querySelector(`input[name="report_style"][value="${style}"]`).checked = true;
      if(data.city_name) document.getElementById('selected_city').innerText = `${data.city_name} (${data.city_lat}, ${data.city_lon})`;
    }

    async function searchCity(){
      const q = document.getElementById('city_query').value.trim();
      if(!q){showMsg('请输入城市名',false);return;}
      const res = await fetch(`/api/search-city?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      const ul = document.getElementById('city_results');
      ul.innerHTML = '';
      if(!data.success){showMsg(data.message || '搜索失败',false);return;}
      data.cities.forEach(c=>{
        const li = document.createElement('li');
        li.innerText = `${c.name} / ${c.country} (${c.lat}, ${c.lon})`;
        li.onclick = ()=>{
          current.city_name = c.name;
          current.city_lat = c.lat;
          current.city_lon = c.lon;
          document.getElementById('selected_city').innerText = `${c.name} (${c.lat}, ${c.lon})`;
        };
        ul.appendChild(li);
      });
    }

    async function saveSettings(){
      const body = {
        ...current,
        deepseek_api_key: document.getElementById('deepseek_api_key').value.trim(),
        news_api_key: document.getElementById('news_api_key').value.trim(),
        openweather_api_key: document.getElementById('openweather_api_key').value.trim(),
        exchangerate_api_key: document.getElementById('exchangerate_api_key').value.trim(),
        gold_api_key: document.getElementById('gold_api_key').value.trim(),
        bark_token: document.getElementById('bark_token').value.trim(),
        news_category: document.getElementById('news_category').value,
        wiki_topic: document.getElementById('wiki_topic').value.trim(),
        report_style: document.querySelector('input[name="report_style"]:checked').value,
        system_prompt: document.getElementById('system_prompt').value.trim(),
      };
      const res = await fetch('/api/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const data = await res.json();
      if(data.success) showMsg('设置已保存', true);
      else showMsg('保存失败', false);
      loadSettings();
    }

    async function triggerReport(){
      const res = await fetch('/trigger');
      const data = await res.json();
      showMsg(data.message || '已触发');
    }

    loadSettings();
  </script>
</body>
</html>
