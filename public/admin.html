<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>设置</title><style>body{font-family:system-ui;background:#0b1020;color:#fff;max-width:900px;margin:0 auto;padding:20px}.card{background:#111827;padding:12px;border:1px solid #334155;border-radius:10px;margin:10px 0}input,textarea,select{width:100%;background:#1f2937;color:#fff;border:1px solid #334155;padding:8px;border-radius:8px}</style></head><body><h1>设置</h1><div class='card'><h3>数据模块开关</h3><label><input type='checkbox' id='weather_enabled'> 天气模块</label><label><input type='checkbox' id='exchange_enabled'> 汇率模块</label><label><input type='checkbox' id='gold_enabled'> 金银价格模块</label><label><input type='checkbox' id='news_enabled'> 新闻模块</label><label><input type='checkbox' id='wiki_enabled'> 维基知识模块</label></div><div class='card'><h3>周报设置</h3><label><input type='checkbox' id='weekly_report_enabled'> 周报开关</label><label>周报生成时间</label><input id='weekly_time' value='周日早上9点' disabled><label>周报DeepSeek倾向</label><textarea id='weekly_prompt'></textarea></div><div class='card'><h3>Markdown导出</h3><label><input type='checkbox' id='markdown_export'> 启用Markdown导出</label></div><button onclick='save()'>保存</button><script>let cur={};async function load(){cur=await (await fetch('/api/settings')).json();['weather_enabled','exchange_enabled','gold_enabled','news_enabled','wiki_enabled','weekly_report_enabled','markdown_export'].forEach(k=>document.getElementById(k).checked=cur[k]!==false);weekly_prompt.value=cur.weekly_prompt||'';}async function save(){['weather_enabled','exchange_enabled','gold_enabled','news_enabled','wiki_enabled','weekly_report_enabled','markdown_export'].forEach(k=>cur[k]=document.getElementById(k).checked);cur.weekly_prompt=weekly_prompt.value;await fetch('/api/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cur)});alert('保存成功');}load();</script></body></html>
